schema:
  - graph/*.graphqls

exec:
  filename: graph/generated/generated.go
  package: generated

model:
  filename: graph/model/models_gen.go
  package: model

resolver:
  layout: follow-schema
  dir: graph
  package: graph

autobind:
  - "github.com/Jnmendza/uh/backend/internal/models"

models:
  ID:
    model:
      - github.com/Jnmendza/uh/backend/internal/models.ObjectID
